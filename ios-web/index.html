<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>OpenBook</title>
    <style>
      :root {
        color-scheme: dark;
        background: #050505;
        color: #f5f2ea;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 50% 12%, rgba(212, 175, 55, 0.2), transparent 36%),
          linear-gradient(180deg, #080808, #000);
      }

      main {
        max-width: 320px;
        padding: 32px;
        text-align: center;
      }

      .icon {
        width: 84px;
        height: 84px;
        margin: 0 auto 24px;
        border-radius: 24px;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 30% 20%, #f8de83, #d4af37 52%, #8a641d);
        color: #111;
        font-size: 44px;
        font-weight: 700;
        box-shadow: 0 18px 46px rgba(212, 175, 55, 0.28);
      }

      h1 {
        margin: 0;
        font-size: 28px;
        letter-spacing: -0.02em;
      }

      p {
        margin: 12px 0 0;
        color: rgba(245, 242, 234, 0.62);
        font-size: 15px;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="icon">O</div>
      <h1>OpenBook</h1>
      <p>OpenBook needs an internet connection to load your local booking apps.</p>
    </main>
  </body>
</html>
